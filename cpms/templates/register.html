{% extends "base.html" %}
{% block title %}Register - CPMS{% endblock %}

{% block content %}
<h2>Student Registration</h2>

<form method="POST" action="{{ url_for('auth.register') }}">
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
        <label for="contact">Contact Number</label>
        <input type="text" id="contact" name="contact" placeholder="Enter your mobile number" required>
    </div>

    <div class="form-group">
        <label for="course">Course</label>
        <select id="course" name="course" required>
            <option value="">-- Select Course --</option>
            <option value="BCA">BCA</option>
            <option value="B.Tech">B.Tech</option>
            <option value="BBA">BBA</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MBA">MBA</option>
        </select>
    </div>

    <div class="form-group">
        <label for="year">Year of Study</label>
        <select id="year" name="year" required>
            <option value="">-- Select Year --</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="Final Year">Final Year</option>
            <option value="6th Sem">6th Sem</option>
        </select>
    </div>

    <div class="form-group">
        <label for="skills">Skills (optional)</label>
        <input type="text" id="skills" name="skills" placeholder="e.g. Python, Java, SQL">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
    </div>

    <button type="submit" class="btn">Register</button>
</form>

<div class="links">
    Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
</div>
{% endblock %}
