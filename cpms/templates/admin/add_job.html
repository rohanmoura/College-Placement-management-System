{% extends "base.html" %}
{% block title %}Add Job Posting - CPMS{% endblock %}
{% block body_class %}admin-job{% endblock %}

{% block content %}
<h2>Add Job Posting</h2>

{% if companies %}
<form method="POST" action="{{ url_for('admin.add_job') }}">
    <div class="form-group">
        <label for="company_id">Select Company</label>
        <select id="company_id" name="company_id" required>
            <option value="">-- Select Company --</option>
            {% for company in companies %}
                <option value="{{ company.company_id }}">{{ company.company_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="job_title">Job Title</label>
        <input type="text" id="job_title" name="job_title" placeholder="Enter job title" required>
    </div>

    <div class="form-group">
        <label for="salary">Salary / CTC (optional)</label>
        <input type="text" id="salary" name="salary" placeholder="e.g. 6 LPA">
    </div>

    <div class="form-group">
        <label for="deadline">Application Deadline</label>
        <input type="date" id="deadline" name="deadline" required>
    </div>

    <button type="submit" class="btn">Post Job</button>
</form>
{% else %}
<p class="links">No companies found. <a href="{{ url_for('admin.add_company') }}">Add a company first</a>.</p>
{% endif %}
{% endblock %}
